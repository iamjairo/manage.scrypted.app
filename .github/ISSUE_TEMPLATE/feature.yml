name: Feature request
description: Suggest a new capability or improvement.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - "src/ (Vue SPA)"
        - "infra/ (Docker / Caddy)"
        - "server-app/ (Electron)"
        - "server-app-tauri/ (Tauri)"
        - "agent-harness/"
        - ".github/ / CI"
        - "Unsure"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: upstream
    attributes:
      label: Upstream
      options:
        - label: This should probably be proposed to `koush/manage.scrypted.app` instead.
