name: "Auto-merge Dependabot (patch/minor only)"

on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited, labeled]
  workflow_dispatch:
    inputs:
      pull_request:
        description: "Pull request number to evaluate (manual runs only)"
        required: false
        type: string

permissions:
  contents: read
  checks: read
  statuses: read
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate and merge eligible Dependabot PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const workflowInputPr = context.payload.inputs?.pull_request;
            const contextPr = context.payload.pull_request?.number;
            const prNumber = Number(contextPr || workflowInputPr || 0);

            if (!prNumber) {
              core.info('No pull request number supplied (event has no pull_request and workflow input is empty). Exiting.');
              return;
            }

            const allowedAuthors = new Set(['dependabot[bot]', 'dependabot']);
            const nativePathPatterns = [
              /^Cargo\.toml$/i,
              /^Cargo\.lock$/i,
              /^server-app-tauri\//i,
              /^src-tauri\//i,
              /(^|\/)native\//i,
              /(^|\/)rust\//i,
            ];
            const nativeKeywordRegex = /\b(node-gyp|bindings|native|prebuild|node-addon-api|nan)\b/i;
            const parseSemver = (version) => {
              const [major, minor, patch] = version
                .replace(/^v/i, '')
                .split('-')[0]
                .split('.')
                .map((n) => Number.parseInt(n, 10));
              if ([major, minor, patch].some((n) => !Number.isInteger(n))) {
                return null;
              }
              return { major, minor, patch };
            };

            const compareSemver = (fromVersion, toVersion) => {
              const from = parseSemver(fromVersion);
              const to = parseSemver(toVersion);
              if (!from || !to) {
                return 'unknown';
              }
              if (to.major > from.major) {
                return 'major';
              }
              if (to.major === from.major && to.minor > from.minor) {
                return 'minor';
              }
              if (to.major === from.major && to.minor === from.minor && to.patch > from.patch) {
                return 'patch';
              }
              return 'none';
            };

            const classifyBump = async (pr, commits) => {
              const fromToPairs = [];
              const rawVersions = [];

              const collectFromText = (text, source) => {
                if (!text) return;

                for (const match of text.matchAll(/from\s+v?(\d+\.\d+\.\d+)\s+to\s+v?(\d+\.\d+\.\d+)/ig)) {
                  fromToPairs.push({ from: match[1], to: match[2], source });
                }

                for (const match of text.matchAll(/\bv?(\d+\.\d+\.\d+)\b/g)) {
                  rawVersions.push({ version: match[1], source });
                }
              };

              collectFromText(pr.title || '', 'pr.title');
              collectFromText(pr.body || '', 'pr.body');
              for (const commit of commits) {
                collectFromText(commit.commit?.message || '', `commit:${commit.sha.slice(0, 7)}`);
              }

              if (!fromToPairs.length && rawVersions.length >= 2) {
                fromToPairs.push({
                  from: rawVersions[0].version,
                  to: rawVersions[rawVersions.length - 1].version,
                  source: 'fallback:version-sequence',
                });
              }

              if (!fromToPairs.length) {
                return { classification: 'unknown', reason: 'Could not extract version transition from PR title/body/commits.' };
              }

              core.info(`Found ${fromToPairs.length} version transition candidate(s): ${JSON.stringify(fromToPairs)}`);

              let sawMinorOrPatch = false;
              for (const pair of fromToPairs) {
                const bump = compareSemver(pair.from, pair.to);
                core.info(`Version check (${pair.source}): ${pair.from} -> ${pair.to} => ${bump}`);

                if (bump === 'major') {
                  return {
                    classification: 'major',
                    reason: `Major version bump detected (${pair.from} -> ${pair.to}) from ${pair.source}.`,
                  };
                }

                if (bump === 'minor' || bump === 'patch') {
                  sawMinorOrPatch = true;
                }
              }

              if (sawMinorOrPatch) {
                return { classification: 'eligible', reason: 'Patch/minor bump detected with no major bump.' };
              }

              return { classification: 'none', reason: 'No patch/minor increase detected.' };
            };

            const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            const getRequiredChecks = async (baseRef) => {
              try {
                const branch = await github.rest.repos.getBranch({ owner, repo, branch: baseRef });
                const requiredStatusChecks = branch.data.protection?.required_status_checks;
                const required = new Set([
                  ...(requiredStatusChecks?.contexts || []),
                  ...((requiredStatusChecks?.checks || []).map((check) => check.context)),
                ]);
                core.info(`Required checks configured on ${baseRef}: ${JSON.stringify([...required])}`);
                return required;
              } catch (error) {
                core.warning(`Unable to read branch protection required checks for ${baseRef}: ${error.message}`);
                return new Set();
              }
            };

            const checkStates = async (sha, requiredChecks) => {
              const [combined, checkRuns] = await Promise.all([
                github.rest.repos.getCombinedStatusForRef({ owner, repo, ref: sha }),
                github.rest.checks.listForRef({ owner, repo, ref: sha, per_page: 100 }),
              ]);

              const contexts = combined.data.statuses || [];
              const runs = checkRuns.data.check_runs || [];

              const failingContexts = contexts.filter((s) => ['failure', 'error'].includes(s.state));
              if (failingContexts.length) {
                return {
                  state: 'failure',
                  detail: `Failing status contexts: ${failingContexts.map((c) => c.context).join(', ')}`,
                };
              }

              const failingRuns = runs.filter((run) => run.status === 'completed' && !['success', 'neutral', 'skipped'].includes(run.conclusion || ''));
              if (failingRuns.length) {
                return {
                  state: 'failure',
                  detail: `Failing check runs: ${failingRuns.map((run) => `${run.name}(${run.conclusion})`).join(', ')}`,
                };
              }

              const pendingContexts = contexts.filter((s) => s.state === 'pending');
              const pendingRuns = runs.filter((run) => run.status !== 'completed');

              if (requiredChecks.size) {
                const unresolvedRequired = [...requiredChecks].filter((required) => {
                  const matchingContext = contexts.find((s) => s.context === required && s.state === 'success');
                  const matchingRun = runs.find((run) => run.name === required && run.status === 'completed' && ['success', 'neutral', 'skipped'].includes(run.conclusion || ''));
                  return !matchingContext && !matchingRun;
                });

                if (unresolvedRequired.length) {
                  return {
                    state: 'pending',
                    detail: `Required checks not yet successful: ${unresolvedRequired.join(', ')}`,
                  };
                }
              }

              if (pendingContexts.length || pendingRuns.length) {
                return {
                  state: 'pending',
                  detail: `Checks still running. pending contexts=${pendingContexts.length}, pending check runs=${pendingRuns.length}`,
                };
              }

              if (combined.data.state !== 'success') {
                return {
                  state: 'pending',
                  detail: `Combined status is '${combined.data.state}', waiting for success.`,
                };
              }

              return { state: 'success', detail: 'All required checks and statuses are successful.' };
            };

            const getMergeablePr = async (number) => {
              for (let attempt = 1; attempt <= 6; attempt += 1) {
                const current = await github.rest.pulls.get({ owner, repo, pull_number: number });
                core.info(`Mergeable poll attempt ${attempt}: mergeable=${current.data.mergeable}, mergeable_state=${current.data.mergeable_state}`);

                if (typeof current.data.mergeable === 'boolean') {
                  return current.data;
                }

                await wait(5000);
              }

              const fallback = await github.rest.pulls.get({ owner, repo, pull_number: number });
              return fallback.data;
            };

            const pr = (await github.rest.pulls.get({ owner, repo, pull_number: prNumber })).data;
            core.info(`Evaluating PR #${pr.number}: ${pr.title}`);
            core.info(`Author=${pr.user.login}, labels=${(pr.labels || []).map((l) => l.name).join(',')}`);

            if (!allowedAuthors.has(pr.user.login)) {
              core.info(`Author '${pr.user.login}' is not Dependabot. Exiting without merge.`);
              return;
            }

            const labels = new Set((pr.labels || []).map((label) => label.name));
            if (!labels.has('dependencies')) {
              core.info('Label "dependencies" is missing. Exiting without merge.');
              return;
            }

            const [commits, changedFiles] = await Promise.all([
              github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              }),
              github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100,
              }),
            ]);

            core.info(`PR has ${commits.length} commit(s) and ${changedFiles.length} changed file(s).`);

            const nativePathMatch = changedFiles.find((file) => nativePathPatterns.some((pattern) => pattern.test(file.filename)));
            if (nativePathMatch) {
              core.info(`Native or Cargo path touched (${nativePathMatch.filename}). Exiting without merge.`);
              return;
            }

            const packageJsonFiles = changedFiles.filter((file) => file.filename.endsWith('package.json'));
            for (const file of packageJsonFiles) {
              const patchText = file.patch || '';
              if (nativeKeywordRegex.test(patchText)) {
                core.info(`Native keyword detected in package.json patch (${file.filename}). Exiting without merge.`);
                return;
              }

            // 4) Inspect changed files to detect native/Cargo or known native indicators
            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            core.info(`Changed files count: ${changedFiles.length}`);

            // Define simple native checks
            const nativePathIndicators = [
              "Cargo.toml",
              "server-app-tauri/",
              "server-app/",
              "Cargo.lock",
            ];
            const nativeKeywords = ["node-gyp", "bindings", "native", "prebuild", "node-addon-api"];
            let touchesNative = false;
            for (const f of changedFiles) {
              const filePath = f.filename || f.path;
              const matchesNative = nativePathIndicators.some(p => {
                // Directory prefixes (end with /) — check if file is inside that directory
                if (p.endsWith("/")) return filePath.startsWith(p);
                // Exact filenames like Cargo.toml / Cargo.lock
                return filePath === p || filePath.endsWith("/" + p);
              });
              if (matchesNative) {
                core.info(`Native path indicator matched: ${filePath}`);
                touchesNative = true;
                break;
              }
            }

            if (!touchesNative) {
              // If package.json changed, fetch its content at head and look for native keywords
              const pkgChanges = changedFiles.filter(f => f.filename.endsWith("package.json"));
              for (const p of pkgChanges) {
                core.info(`package.json changed at: ${p.filename} — inspecting for native build keywords`);
                try {
                  const contentResp = await github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: p.filename,
                    ref: pr.head.sha,
                  });
                  const contentBuffer = Buffer.from(contentResp.data.content, contentResp.data.encoding);
                  const pkgText = contentBuffer.toString("utf8");
                  if (nativeKeywords.some(k => pkgText.includes(k))) {
                    core.info(`Native keyword found in ${p.filename} — will NOT auto-merge.`);
                    touchesNative = true;
                    break;
                  }
                } catch (err) {
                  core.info(`Failed to fetch ${p.filename} at head ref: ${err}`);
                  // Conservative approach: treat inability to inspect as potential native -> skip merge
                  touchesNative = true;
                  break;
                }
              } catch (error) {
                core.info(`Failed to inspect ${file.filename}: ${error.message}. Conservative skip.`);
                return;
              }
            }

            const versionDecision = await classifyBump(pr, commits);
            core.info(`Version classification: ${versionDecision.classification} (${versionDecision.reason})`);
            if (versionDecision.classification !== 'eligible') {
              core.info('PR is not an eligible patch/minor update. Exiting without merge.');
              return;
            }

            // 5) Wait for required status checks to pass (best-effort polling)
            const ref = pr.head.sha;
            core.info(`Waiting for checks/statuses on ref ${ref} (will poll up to 10 times, 15s interval).`);
            let attempts = 0;
            let combinedState = null;
            while (attempts < 10) {
              attempts++;
              const status = await github.rest.repos.getCombinedStatusForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
              });
              combinedState = status.data.state; // 'success', 'failure', 'pending'
              core.info(`Attempt ${attempts}: combined status = ${combinedState}`);
              if (combinedState === "success") break;
              if (combinedState === "failure") {
                core.info("Status checks failing — will not merge.");
                return;
              }

              if (state.state === 'success') {
                checksReady = true;
                break;
              }

              await wait(15000);
            }

            if (!checksReady) {
              core.info('Required checks did not reach success before timeout. Exiting without merge.');
              return;
            }

            // Re-check PR mergeable state
            const prDetails = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (!prDetails.data.mergeable) {
              core.info(`PR mergeable state is false (state=${prDetails.data.mergeable_state}) — skipping.`);
              return;
            }

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: "merge",
                commit_title: `chore: auto-merge Dependabot updates (patch/minor) — PR #${prNumber}`,
                commit_message: `Auto-merged by workflow: patch/minor dependency bump from Dependabot.\n\nPR: ${pr.html_url}`,
              });
              core.info(`Successfully merged PR #${pr.number} with merge commit.`);
            } catch (error) {
              const mergeableState = mergeablePr.mergeable_state || 'unknown';
              const guidance = [
                `status=${error.status || 'n/a'}`,
                `message=${error.message}`,
                `mergeable_state=${mergeableState}`,
                `required_reviews=${mergeablePr.requested_reviewers?.length || 0}`,
              ].join('; ');

              core.setFailed(
                `Auto-merge was blocked by repository permissions/protection settings. ` +
                `Check branch protection (required reviewers, required checks, or token merge restrictions). Details: ${guidance}`,
              );
            }
