name: server-app release

on:
  push:
    tags:
      - server-app-v*
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: server-app-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect server-app
        id: server-app
        run: |
          if [ -d server-app ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "server-app/ not found; skipping release build."
          fi

      - name: Setup Node.js
        if: steps.server-app.outputs.exists == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: server-app/package-lock.json

      - name: Cache electron-builder artifacts
        if: steps.server-app.outputs.exists == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-server-app-electron-${{ hashFiles('server-app/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-server-app-electron-

      - name: Install Linux build dependencies
        if: steps.server-app.outputs.exists == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential python3 \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libgtk-3-0 libgbm1 libasound2 \
            fakeroot dpkg rpm

      - name: Install dependencies
        if: steps.server-app.outputs.exists == 'true'
        run: npm ci
        working-directory: server-app

      - name: Build Linux release artifacts
        if: steps.server-app.outputs.exists == 'true'
        run: npm run build
        working-directory: server-app

      - name: Verify Linux release artifacts
        if: steps.server-app.outputs.exists == 'true'
        run: |
          ls -1 release/*.AppImage
          ls -1 release/*.deb
        working-directory: server-app

      - name: Upload Linux release artifacts
        if: steps.server-app.outputs.exists == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: server-app-linux
          path: |
            server-app/release/*.AppImage
            server-app/release/*.deb

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/server-app-v') && steps.server-app.outputs.exists == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            server-app/release/*.AppImage
            server-app/release/*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
