name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sundays 04:17 UTC — offset from common cron times to avoid contention
    - cron: "17 4 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # Rust analysis activates once server-app-tauri/src-tauri exists.
          # CodeQL's Rust support is currently in public preview; if the build
          # fails because the directory is missing, this matrix entry is a
          # no-op (steps.guard.outputs.skip will be 'true').
          - language: rust
            build-mode: manual
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard — skip Rust when src-tauri is absent
        id: guard
        run: |
          if [ "${{ matrix.language }}" = "rust" ] && [ ! -d "server-app-tauri/src-tauri" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping Rust analysis — server-app-tauri/src-tauri does not exist yet."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.guard.outputs.skip != 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Set up Rust (Rust matrix only)
        if: steps.guard.outputs.skip != 'true' && matrix.language == 'rust'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build Rust (Rust matrix only)
        if: steps.guard.outputs.skip != 'true' && matrix.language == 'rust'
        working-directory: server-app-tauri/src-tauri
        run: cargo build --release --locked || cargo build --release

      - name: Perform CodeQL Analysis
        if: steps.guard.outputs.skip != 'true'
        id: codeql-analyze
        # continue-on-error allows CI to pass even when SARIF upload is rejected
        # because the repository's default CodeQL setup is also active.  Once the
        # default setup is disabled (Settings → Security → Code scanning → Default
        # setup → Disable), this step will succeed unconditionally and this guard
        # can be removed.
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

      - name: Warn — SARIF upload conflict with default CodeQL setup
        if: steps.codeql-analyze.outcome == 'failure'
        run: |
          echo "::warning::CodeQL SARIF upload failed. This usually means the repository has both the default CodeQL setup AND this advanced workflow enabled simultaneously. The analysis did run successfully; SARIF was generated but GitHub rejected the upload. To resolve: Settings → Security → Code scanning → Default setup → Disable."
          {
            echo "### ⚠️ CodeQL SARIF Upload Conflict — action needed"
            echo ""
            echo "The CodeQL analysis **completed successfully**, but the SARIF upload"
            echo "was rejected because the repository's **default CodeQL setup is also active**."
            echo ""
            echo "**To fix (one-time, owner action):**"
            echo "1. Go to **Settings → Security → Code scanning → Default setup**."
            echo "2. Click **Disable** to turn off the default setup."
            echo "3. Re-run this workflow — it will upload SARIF without conflict."
            echo ""
            echo "Security alerts are still visible from the default setup scan until the fix is applied."
          } >> "$GITHUB_STEP_SUMMARY"
