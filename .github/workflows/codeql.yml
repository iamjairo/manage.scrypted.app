name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Sundays 04:17 UTC — offset from common cron times to avoid contention
    - cron: "17 4 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none
          # Rust analysis activates once server-app-tauri/src-tauri exists.
          # CodeQL's Rust support is currently in public preview; if the build
          # fails because the directory is missing, this matrix entry is a
          # no-op (steps.guard.outputs.skip will be 'true').
          - language: rust
            build-mode: manual
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Guard — skip Rust when src-tauri is absent
        id: guard
        run: |
          if [ "${{ matrix.language }}" = "rust" ] && [ ! -d "server-app-tauri/src-tauri" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skipping Rust analysis — server-app-tauri/src-tauri does not exist yet."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Initialize CodeQL
        if: steps.guard.outputs.skip != 'true'
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Set up Rust (Rust matrix only)
        if: steps.guard.outputs.skip != 'true' && matrix.language == 'rust'
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Build Rust (Rust matrix only)
        if: steps.guard.outputs.skip != 'true' && matrix.language == 'rust'
        working-directory: server-app-tauri/src-tauri
        run: cargo build --release --locked || cargo build --release

      - name: Perform CodeQL Analysis
        if: steps.guard.outputs.skip != 'true'
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
